name: Build macOS bundle

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Build SlideDrop.app
        run: chmod +x scripts/macos/build-macos.sh && ./scripts/macos/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: SlideDrop-macOS
          path: release/macos/SlideDrop-macOS.zip
